<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans JP','JetBrains Mono',sans-serif;background:#111318;color:#c8ccd4;min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,textarea,button{font-family:inherit}
textarea:focus,input:focus{outline:none;border-color:#e8c87260 !important}
input[type=range]{height:6px;cursor:pointer}
input[type=color]{cursor:pointer;border:none;padding:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2a2d35;border-radius:4px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .35s ease-out both}
.delay-1{animation-delay:.06s}.delay-2{animation-delay:.12s}.delay-3{animation-delay:.18s}.delay-4{animation-delay:.24s}

/* Header */
.header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2028;background:#111318f0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

.version{font-size:9px;color:#8a8f98;border:1px solid #2a2d35;padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono';margin-left:8px}
.tool-label{font-size:13px;font-weight:600}

/* Main */
.main{max-width:640px;margin:0 auto;padding:20px 16px}
.main.has-nav{padding-bottom:80px}

/* Hero */
.hero{text-align:center;padding:36px 0 32px}
.hero-sub{font-size:11px;color:#e8c872;font-family:'JetBrains Mono';letter-spacing:4px;margin-bottom:8px}
.hero h1{font-size:32px;font-family:Orbitron;font-weight:900;background:linear-gradient(135deg,#e8c872 0%,#e8a86e 40%,#6ec6e6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;line-height:1.2}
.hero p{color:#8a8f98;font-size:13px;margin-top:10px;line-height:1.5}
.hero-line{width:40px;height:2px;background:linear-gradient(90deg,#e8c872,#6ec6e6);margin:16px auto 0;border-radius:2px}

/* Cards */
.card{display:flex;align-items:center;gap:14px;padding:18px 16px;border-radius:14px;background:#14161c;border:1px solid #1e2028;cursor:pointer;transition:all .2s;margin-bottom:10px}
.card:active{transform:scale(.98);border-color:#e8c87230}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-title{font-size:15px;font-weight:700;color:#e8e8ec}
.card-desc{font-size:12px;color:#8a8f98;margin-top:2px}
.card-arrow{color:#2a2d35;font-size:20px;flex-shrink:0}

/* Stat Grid */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat-box{padding:10px 6px;border-radius:10px;background:#14161c;border:1px solid #1e2028;text-align:center}
.stat-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.stat-label{font-size:10px;color:#8a8f98;margin-top:3px}

/* Pill buttons */

.pill.active{border-color:#e8c87280;background:#e8c87215;color:#e8c872;font-weight:600}

/* Textarea */
.textarea{width:100%;padding:14px;border-radius:12px;border:1px solid #2a2d35;background:#0d0e12;color:#c8ccd4;font-family:'JetBrains Mono',monospace;font-size:13px;resize:vertical;line-height:1.6}
.textarea-jp{font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.8}

/* Tab switch */
.tab-bar{display:flex;border-radius:10px;overflow:hidden;border:1px solid #2a2d35;margin-bottom:12px}
.tab-btn{flex:1;padding:10px;border:none;background:#0d0e12;color:#8a8f98;cursor:pointer;font-size:13px;font-family:inherit}
.tab-btn.active{background:#1e2028;color:#e8c872;font-weight:600}

/* Code output */
.code-out{width:100%;min-height:260px;padding:14px;border-radius:12px;border:1px solid #2a2d35;background:#0d0e12;color:#a8e6a3;font-family:'JetBrains Mono',monospace;font-size:13px;overflow:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.code-out.error{color:#e87272;border-color:#e8727240}

/* Password row */
.pw-row{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:12px;background:#0d0e12;border:1px solid #1e2028;cursor:pointer;transition:all .2s;margin-bottom:8px}
.pw-row.copied{border-color:#a8e6a350}
.pw-code{font-size:13px;color:#c8ccd4;font-family:'JetBrains Mono',monospace;word-break:break-all;line-height:1.4}

/* Primary button */
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#e8c872,#e8a86e);color:#0d0e12;font-size:15px;font-weight:700;cursor:pointer}
.btn-secondary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#c89de8,#6ec6e6);color:#0d0e12;font-size:15px;font-weight:700;cursor:pointer}

/* Settings panel */
.settings{padding:16px;border-radius:14px;background:#14161c;border:1px solid #1e2028;margin-bottom:14px}
.settings-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.strength-bar{width:60px;height:5px;border-radius:3px;background:#2a2d35;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:all .3s}

/* Color picker row */
.color-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.color-input{width:40px;height:40px;border:2px solid #2a2d35;border-radius:10px}
.color-label{font-family:'JetBrains Mono';font-size:11px;color:#8a8f98}
.color-add,.color-remove{width:40px;height:40px;border-radius:10px;border:1px dashed #2a2d35;background:transparent;cursor:pointer;font-size:20px}

/* CSS output */
.css-out{padding:14px;border-radius:12px;background:#0d0e12;border:1px solid #1e2028;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;color:#a8e6a3;transition:all .2s;line-height:1.5;word-break:break-all}

/* Gradient preview */
.grad-preview{height:180px;border-radius:16px;border:1px solid #1e2028;transition:all .5s;margin-bottom:14px}

/* QR canvas wrapper */
.qr-wrap{padding:20px;border-radius:16px;border:1px solid #1e2028;display:inline-block}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111318f8;border-top:1px solid #1e2028;display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;border:none;background:transparent;color:#8a8f9860;cursor:pointer;font-size:10px;font-family:inherit;transition:all .2s;position:relative}
.nav-btn.active{color:var(--nav-color,#e8c872)}
.nav-dot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:16px;height:2px;border-radius:1px}
.nav-icon{font-size:16px}

/* Footer */
.footer{text-align:center;padding:18px 16px;color:#8a8f9860;font-size:12px;margin-top:32px}
.footer-banner{text-align:center;margin-top:32px;padding:18px 16px;border-radius:14px;background:#14161c80;border:1px solid #1e2028}
.footer-banner p{color:#8a8f98;font-size:12px;line-height:1.5}

/* Ad placeholder */
.ad-slot{width:100%;min-height:90px;border-radius:12px;background:#14161c;border:1px dashed #2a2d3540;display:flex;align-items:center;justify-content:center;color:#8a8f9830;font-size:11px;margin:16px 0}
</style>

  </div>

<main id="main" class="main">
  <!-- Home Page -->
  <div id="homePage">
    <div class="hero fade-up">
      <div class="hero-sub">FREE ONLINE</div>
      <h1>DEV TOOLS</h1>
      <p>開発者のための無料ツール集<br>登録不要・ブラウザ完結</p>
      <div class="hero-line"></div>

<nav id="bottomNav" class="bottom-nav" style="display:none"></nav>

<script>
// ─── Tool Config ───
const TOOLS = {
  json:     { name:"JSON整形",     icon:"{ }",  color:"#e8c872", desc:"JSONの整形・検証・ツリー表示" },
  counter:  { name:"文字数カウント", icon:"Aa",   color:"#6ec6e6", desc:"文字数・行数・読了時間を計測" },
  password: { name:"パスワード生成", icon:"🔐",   color:"#a8e6a3", desc:"安全なパスワードをワンクリック生成" },
  qr:       { name:"QRコード生成",  icon:"▣",    color:"#c89de8", desc:"URL・テキストからQRコードを生成" },
  gradient: { name:"グラデCSS",    icon:"◐",    color:"#e8a86e", desc:"CSSグラデーションをGUIで作成" },
};

let activeTool = null;
const $ = id => document.getElementById(id);

// ─── Navigation ───
function goHome() {
  activeTool = null;
  $('homePage').style.display = '';
  $('toolPage').style.display = 'none';
  $('bottomNav').style.display = 'none';
  $('main').classList.remove('has-nav');
  $('headerToolLabel').innerHTML = '';
  history.pushState(null, '', '/');
  document.title = 'DevTools - JSON整形・文字数カウント・パスワード生成 | 無料オンライン開発者ツール';
}

function openTool(key) {
  activeTool = key;
  const t = TOOLS[key];
  $('homePage').style.display = 'none';
  $('toolPage').style.display = '';
  $('bottomNav').style.display = 'flex';
  $('main').classList.add('has-nav');
  $('headerToolLabel').innerHTML = `<span style="color:${t.color}">${t.icon} ${t.name}</span>`;
  history.pushState(null, '', '#' + key);
  document.title = `${t.name} - 無料オンラインツール | DevTools`;
  renderTool(key);
  renderBottomNav();
  window.scrollTo(0, 0);
}

// ─── Render Home Cards ───
function renderCards() {
  const el = $('toolCards');
  el.innerHTML = Object.entries(TOOLS).map(([k, t], i) => `
    <div class="card fade-up delay-${i}" onclick="openTool('${k}')">
      <div class="card-icon" style="background:${t.color}15;border:1px solid ${t.color}30;color:${t.color}">${t.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="card-title">${t.name}</div>
        <div class="card-desc">${t.desc}</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  `).join('');
}

// ─── Bottom Nav ───
function renderBottomNav() {
  const nav = $('bottomNav');
  let html = `<button class="nav-btn" onclick="goHome()"><span class="nav-icon">⚡</span>ホーム</button>`;
  for (const [k, t] of Object.entries(TOOLS)) {
    const isActive = activeTool === k;
    html += `<button class="nav-btn${isActive?' active':''}" style="--nav-color:${t.color}" onclick="openTool('${k}')">
      ${isActive ? `<div class="nav-dot" style="background:${t.color}"></div>` : ''}
      <span class="nav-icon">${t.icon}</span>
      <span style="max-width:42px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name.replace(/生成|カウント/,'')}</span>
    </button>`;
  }
  nav.innerHTML = html;
}

// ─── Tool Renderers ───
function renderTool(key) {
  const el = $('toolContent');
  switch(key) {
    case 'json': renderJson(el); break;
    case 'counter': renderCounter(el); break;
    case 'password': renderPassword(el); break;
    case 'qr': renderQR(el); break;
    case 'gradient': renderGradient(el); break;
  }
}

// ── JSON ──
function renderJson(el) {
  el.innerHTML = `
    <div class="stat-grid"><div class="stat-box"><div class="stat-val" id="jKeys" style="color:#e8c872">0</div><div class="stat-label">キー数</div></div><div class="stat-box"><div class="stat-val" id="jDepth" style="color:#6ec6e6">0</div><div class="stat-label">深度</div></div><div class="stat-box"><div class="stat-val" id="jSize" style="color:#a8e6a3">0B</div><div class="stat-label">サイズ</div></div></div>
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <button class="pill active" id="jIndent2" onclick="setJsonIndent(2)">2sp</button>
      <button class="pill" id="jIndent4" onclick="setJsonIndent(4)">4sp</button>
      <div style="flex:1"></div>
      <button class="pill" onclick="copyJsonOutput()" id="jCopyBtn">コピー</button>
    </div>
    <div class="tab-bar"><button class="tab-btn active" id="jTabIn" onclick="setJsonTab('in')">入力</button><button class="tab-btn" id="jTabOut" onclick="setJsonTab('out')">出力</button></div>
    <div id="jInputWrap"><textarea class="textarea" id="jInput" oninput="formatJson()" style="min-height:260px">{"name":"太郎","age":25,"hobbies":["読書","ゲーム"],"address":{"city":"東京"}}</textarea></div>
    <div id="jOutputWrap" style="display:none"><pre class="code-out" id="jOutput"></pre></div>`;
  window._jsonIndent = 2;
  window._jsonTab = 'in';
  formatJson();
}
function setJsonIndent(n) {
  window._jsonIndent = n;
  $('jIndent2').className = 'pill' + (n===2?' active':'');
  $('jIndent4').className = 'pill' + (n===4?' active':'');
  formatJson();
}
function setJsonTab(t) {
  window._jsonTab = t;
  $('jTabIn').className = 'tab-btn' + (t==='in'?' active':'');
  $('jTabOut').className = 'tab-btn' + (t==='out'?' active':'');
  $('jInputWrap').style.display = t==='in'?'':'none';
  $('jOutputWrap').style.display = t==='out'?'':'none';
}
function formatJson() {
  const input = $('jInput').value;
  try {
    const p = JSON.parse(input);
    const f = JSON.stringify(p, null, window._jsonIndent);
    const keys = (JSON.stringify(p).match(/"[^"]+"\s*:/g)||[]).length;
    let mx=0,c=0; for(const ch of f){if(ch==='{'||ch==='[')c++;if(ch==='}'||ch===']')c--;mx=Math.max(mx,c);}
    $('jOutput').textContent = f;
    $('jOutput').className = 'code-out';
    $('jKeys').textContent = keys;
    $('jDepth').textContent = mx;
    $('jSize').textContent = new Blob([input]).size + 'B';
    window._jsonFormatted = f;
  } catch(e) {
    $('jOutput').textContent = e.message;
    $('jOutput').className = 'code-out error';
    window._jsonFormatted = '';
  }
}
function copyJsonOutput() {
  navigator.clipboard?.writeText(window._jsonFormatted || $('jInput').value);
  $('jCopyBtn').textContent = '✓ コピー済';
  setTimeout(() => $('jCopyBtn').textContent = 'コピー', 1200);
}

// ── Counter ──
function renderCounter(el) {
  const labels = ['文字数','空白除く','行数','単語数','バイト','読了(分)','ひらがな','カタカナ','漢字'];
  const colors = ['#e8c872','#6ec6e6','#a8e6a3','#c89de8','#e8a86e','#e87272','#e8c872','#6ec6e6','#a8e6a3'];
  el.innerHTML = `
    <div class="stat-grid">${labels.map((l,i) => `<div class="stat-box"><div class="stat-val" id="cs${i}" style="color:${colors[i]}">0</div><div class="stat-label">${l}</div></div>`).join('')}</div>
    <textarea class="textarea textarea-jp" id="cInput" oninput="countChars()" placeholder="ここにテキストを入力..." style="min-height:220px"></textarea>`;
}
function countChars() {
  const t = $('cInput').value;
  const vals = [
    t.length,
    t.replace(/\s/g,'').length,
    t ? t.split('\n').length : 0,
    t.trim() ? t.trim().split(/\s+/).length : 0,
    new Blob([t]).size,
    Math.max(1, Math.ceil(t.length/500)),
    (t.match(/[\u3041-\u3096]/g)||[]).length,
    (t.match(/[\u30A1-\u30F6]/g)||[]).length,
    (t.match(/[\u4E00-\u9FFF]/g)||[]).length,
  ];
  vals.forEach((v,i) => $('cs'+i).textContent = v.toLocaleString());
}

// ── Password ──
function renderPassword(el) {
  el.innerHTML = `
    <div class="settings">
      <div class="settings-row">
        <span style="color:#c8ccd4;font-size:14px">文字数 <strong style="color:#e8c872;font-family:'JetBrains Mono'" id="pwLenVal">16</strong></span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="strength-bar"><div class="strength-fill" id="pwStr"></div></div>
          <span id="pwStrLabel" style="font-size:11px;font-weight:600"></span>
        </div>
      </div>
      <input type="range" min="4" max="64" value="16" id="pwLen" oninput="updatePwLen()" style="width:100%;accent-color:#e8c872">
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
        <button class="pill active" id="pwUpper" onclick="togglePwOpt('upper')">A-Z</button>
        <button class="pill active" id="pwLower" onclick="togglePwOpt('lower')">a-z</button>
        <button class="pill active" id="pwNum" onclick="togglePwOpt('num')">0-9</button>
        <button class="pill active" id="pwSym" onclick="togglePwOpt('sym')">!@#</button>
      </div>
    </div>
    <div id="pwList"></div>
    <button class="btn-primary" onclick="generatePasswords()" style="margin-top:6px">再生成</button>`;
  window._pwOpts = {upper:true,lower:true,num:true,sym:true};
  window._pwLen = 16;
  generatePasswords();
}
function updatePwLen() { window._pwLen = +$('pwLen').value; $('pwLenVal').textContent = window._pwLen; generatePasswords(); }
function togglePwOpt(k) { window._pwOpts[k] = !window._pwOpts[k]; $('pw'+k.charAt(0).toUpperCase()+k.slice(1)).className = 'pill'+(window._pwOpts[k]?' active':''); generatePasswords(); }
function generatePasswords() {
  let cs='';
  if(window._pwOpts.upper)cs+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(window._pwOpts.lower)cs+='abcdefghijklmnopqrstuvwxyz';
  if(window._pwOpts.num)cs+='0123456789';
  if(window._pwOpts.sym)cs+='!@#$%^&*_+-=?';
  if(!cs)cs='abcdefghijklmnopqrstuvwxyz';
  const len = window._pwLen;
  const pool = (window._pwOpts.upper?26:0)+(window._pwOpts.lower?26:0)+(window._pwOpts.num?10:0)+(window._pwOpts.sym?14:0);
  const ent = Math.floor(len*Math.log2(pool||1));
  const str = ent>=80?{l:'非常に強い',c:'#a8e6a3',p:100}:ent>=60?{l:'強い',c:'#6ec6e6',p:75}:ent>=40?{l:'普通',c:'#e8c872',p:50}:{l:'弱い',c:'#e87272',p:25};
  $('pwStr').style.width=str.p+'%';$('pwStr').style.background=str.c;
  $('pwStrLabel').textContent=str.l;$('pwStrLabel').style.color=str.c;
  let html = '';
  for(let i=0;i<5;i++){
    let pw='';const a=new Uint32Array(len);crypto.getRandomValues(a);
    for(let j=0;j<len;j++)pw+=cs[a[j]%cs.length];
    html+=`<div class="pw-row" id="pwr${i}" onclick="copyPw(${i},'${pw.replace(/'/g,"\\'")}')"><code class="pw-code">${pw}</code><span style="font-size:11px;color:#8a8f9860;margin-left:10px;white-space:nowrap;flex-shrink:0" id="pwl${i}">TAP</span></div>`;
  }
  $('pwList').innerHTML = html;
}
function copyPw(i, pw) {
  navigator.clipboard?.writeText(pw);
  $('pwr'+i).classList.add('copied');
  $('pwl'+i).textContent='✓'; $('pwl'+i).style.color='#a8e6a3';
}

// ── QR ──
function renderQR(el) {
  el.innerHTML = `
    <textarea class="textarea" id="qrInput" oninput="drawQR()" placeholder="URL・テキストを入力..." style="min-height:56px;resize:none;margin-bottom:14px">https://example.com</textarea>
    <div style="display:flex;gap:16px;align-items:center;justify-content:center;margin-bottom:14px">
      <label style="display:flex;align-items:center;gap:6px;color:#8a8f98;font-size:12px">前景 <input type="color" value="#e8c872" id="qrFg" onchange="drawQR()" style="width:36px;height:30px;border:1px solid #2a2d35;border-radius:6px"></label>
      <label style="display:flex;align-items:center;gap:6px;color:#8a8f98;font-size:12px">背景 <input type="color" value="#0d0e12" id="qrBg" onchange="drawQR()" style="width:36px;height:30px;border:1px solid #2a2d35;border-radius:6px"></label>
    </div>
    <div style="text-align:center"><div class="qr-wrap" id="qrWrap"><canvas id="qrCanvas" style="display:block;width:240px;height:240px;image-rendering:pixelated"></canvas></div></div>
    <button class="btn-secondary" onclick="downloadQR()" style="margin-top:14px">PNGダウンロード</button>
    <p style="font-size:10px;color:#8a8f9860;text-align:center;margin-top:10px">※ 簡易QR表示。本番は qrcode.js 等推奨</p>`;
  drawQR();
}
function generateQRMatrix(text){const size=21;const m=Array.from({length:size},()=>Array(size).fill(false));const df=(r,c)=>{for(let i=0;i<7;i++)for(let j=0;j<7;j++)m[r+i][c+j]=i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4)};df(0,0);df(0,14);df(14,0);for(let i=8;i<13;i++){m[6][i]=i%2===0;m[i][6]=i%2===0}let bits=[];for(let i=0;i<text.length;i++){const c=text.charCodeAt(i);for(let b=7;b>=0;b--)bits.push((c>>b)&1)}let bi=0;for(let col=size-1;col>0;col-=2){if(col===6)col=5;for(let row=0;row<size;row++)for(let c=0;c<2;c++){const x=col-c,y=row;if(!m[y][x]&&bi<bits.length){m[y][x]=bits[bi]===1;bi++}}}return m}
function drawQR(){
  const text=$('qrInput').value;if(!text.trim())return;
  const fg=$('qrFg').value,bg=$('qrBg').value;
  const matrix=generateQRMatrix(text);const size=matrix.length;const scale=12;
  const cv=$('qrCanvas');cv.width=size*scale;cv.height=size*scale;
  const ctx=cv.getContext('2d');ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle=fg;matrix.forEach((row,y)=>row.forEach((cell,x)=>{if(cell)ctx.fillRect(x*scale,y*scale,scale,scale)}));
  $('qrWrap').style.background=bg;
}
function downloadQR(){const a=document.createElement('a');a.download='qrcode.png';a.href=$('qrCanvas').toDataURL();a.click();}

// ── Gradient ──
function renderGradient(el) {
  window._gradColors = ['#e8c872','#6ec6e6','#c89de8'];
  window._gradAngle = 135;
  window._gradType = 'linear';
  el.innerHTML = `
    <div class="grad-preview" id="gradPreview"></div>
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px">
      <button class="pill active" id="gradLinear" onclick="setGradType('linear')">リニア</button>
      <button class="pill" id="gradRadial" onclick="setGradType('radial')">ラジアル</button>
      <div style="flex:1"></div>
      <button class="pill" onclick="randomGrad()">🎲 ランダム</button>
    </div>
    <div id="gradAngleWrap" style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span style="color:#8a8f98;font-size:12px;white-space:nowrap" id="gradAngleLabel">135°</span>
      <input type="range" min="0" max="360" value="135" id="gradAngle" oninput="updateGradAngle()" style="flex:1;accent-color:#e8a86e">
    </div>
    <div class="color-row" id="gradColorRow"></div>
    <div class="css-out" id="gradCSS" onclick="copyGradCSS()"></div>`;
  updateGradUI();
}
function setGradType(t){window._gradType=t;$('gradLinear').className='pill'+(t==='linear'?' active':'');$('gradRadial').className='pill'+(t==='radial'?' active':'');$('gradAngleWrap').style.display=t==='linear'?'flex':'none';updateGradUI();}
function updateGradAngle(){window._gradAngle=+$('gradAngle').value;$('gradAngleLabel').textContent=window._gradAngle+'°';updateGradUI();}
function randomGrad(){const rc=()=>'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');window._gradColors=[rc(),rc(),rc()];window._gradAngle=Math.floor(Math.random()*360);$('gradAngle').value=window._gradAngle;$('gradAngleLabel').textContent=window._gradAngle+'°';updateGradUI();}
function updateGradUI(){
  const cs=window._gradColors,a=window._gradAngle,t=window._gradType;
  const grad=t==='linear'?`linear-gradient(${a}deg,${cs.join(',')})`:`radial-gradient(circle,${cs.join(',')})`;
  $('gradPreview').style.background=grad;
  const css=`background: ${grad};`;
  $('gradCSS').textContent=css;
  window._gradCSSText=css;
  // Color pickers
  let html=cs.map((c,i)=>`<div style="display:flex;align-items:center;gap:6px"><input type="color" value="${c}" class="color-input" onchange="updateGradColor(${i},this.value)"><span class="color-label">${c}</span></div>`).join('');
  if(cs.length<5)html+=`<button class="color-add" style="color:#8a8f98" onclick="addGradColor()">+</button>`;
  if(cs.length>2)html+=`<button class="color-remove" style="color:#e87272" onclick="removeGradColor()">−</button>`;
  $('gradColorRow').innerHTML=html;
}
function updateGradColor(i,v){window._gradColors[i]=v;updateGradUI();}
function addGradColor(){window._gradColors.push('#ffffff');updateGradUI();}
function removeGradColor(){window._gradColors.pop();updateGradUI();}
function copyGradCSS(){navigator.clipboard?.writeText(window._gradCSSText);$('gradCSS').textContent='✓ コピー済！';setTimeout(()=>$('gradCSS').textContent=window._gradCSSText,1200);}
